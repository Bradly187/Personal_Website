server {
    listen 80;
    server_name bradtarver.com www.bradtarver.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bradtarver.com www.bradtarver.com;

    ssl_certificate /etc/letsencrypt/live/bradtarver.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bradtarver.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/html;
    index index.html;

    # Custom 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Cache static assets (images, PDF, fonts)
    location ~* \.(png|jpg|jpeg|gif|svg|ico|pdf|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cache CSS/JS (inline in HTML, but covers future additions)
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # HTML — short cache so updates propagate quickly
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
